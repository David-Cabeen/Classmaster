<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro e inicio</title>
    <link rel="stylesheet" href="inicio.css">
</head>
<body>
    <section class="container">
        <section class="container-form">
            <form class="sign-in">
                <h2>Iniciar Sesion</h2>
                <section class="social">
                    <ion-icon name="logo-tiktok"></ion-icon>
                    <ion-icon name="logo-youtube"></ion-icon>
                    <ion-icon name="logo-twitter"></ion-icon>
                    <ion-icon name="logo-instagram"></ion-icon>
                </section>
                <span>Use su correo y contraseña</span>
                <section class="container-input">
                    <ion-icon name="mail-outline"></ion-icon>
                    <input type="text" placeholder="Email">
                </section>
                <section class="container-input">
                    <ion-icon name="lock-closed-outline"></ion-icon>
                    <input type="password" placeholder="password">
                </section>
                <a href="#">¿As olvidado tu contraseña?</a>
                <button class="button">Iniciar Sesion</button>

            </form>

        </section>

        <section class="container-form">
            <form class="sign-up">
                <h2>Registrarse</h2>
                <section class="social">
                    <ion-icon name="logo-tiktok"></ion-icon>
                    <ion-icon name="logo-youtube"></ion-icon>
                    <ion-icon name="logo-twitter"></ion-icon>
                    <ion-icon name="logo-instagram"></ion-icon>
                </section>
                <span>Use su correo electronico para registrarse</span>
                <section class="container-input">
                    <ion-icon name="person-outline"></ion-icon>
                    <input type="text" placeholder="Nombre">
                </section>
                <section class="container-input">
                    <ion-icon name="mail-outline"></ion-icon>
                    <input type="text" placeholder="Email">
                </section>
                <section class="container-input">
                    <ion-icon name="lock-closed-outline"></ion-icon>
                    <input type="password" placeholder="password">
                </section>
                <button class="button">Registrarse</button>

            </form>


        </section>

        <section class="container-welcome">
            <section class="welcome-sign-up welcome">
                <h3>Bienvenido</h3>
                <p>Ingrese sus datos personales para usar todas las funciones del sitio</p>
                <button class="button" id="btn-sign-up">Registrarse</button>
            </section>
            <section class="welcome-sign-in welcome">
                <h3>Hola</h3>
                <p>Registrese con sus datos personales para usar todas las funciones del sitio</p>
                <button  class="button" id="btn-sign-in">Iniciar sesion</button>

            </section>

        </section>


    </section>

   

    <script src="inicio.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

    
    

</body>
</html>
