<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro e inicio</title>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js" defer></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js" defer></script>
</head>
<body>
    <div id="overlay"></div>
    <section class="container">
        <section class="container-form">
            <form action="../php/login.php" method="POST" class="sign-in">
                <h2>Iniciar Sesión</h2>
                <section class="container-input">
                    <ion-icon name="id-card-outline"></ion-icon>
                    <input type="number" name="id_estudiante" placeholder="ID de Estudiante" required>
                </section>
                <section class="container-input">
                    <ion-icon name="lock-closed-outline"></ion-icon>
                    <input type="password" name="password" class="password" placeholder="Password" required>
                    <ion-icon class="eye-icon" name="eye-outline"></ion-icon>
                </section>
                <button class="button">Iniciar Sesión</button>
            </form>
            
        </section>

        <section class="container-form">
            <form class="sign-up" action="../php/registro.php" method="POST">
                <h2>Registrarse</h2>
                <section class="container-input">
                  <ion-icon name="id-card-outline"></ion-icon>
                  <input type="number" name="id" placeholder="ID de Estudiante" required />
                </section>
                <section class="container-input">
                  <ion-icon name="mail-outline"></ion-icon>
                  <input type="text" name="email" placeholder="Email" required />
                </section>
                <section class="container-input">
                  <ion-icon name="lock-closed-outline"></ion-icon>
                  <input type="password" name="contraseña" class="password" placeholder="Contraseña" required />
                  <ion-icon class="eye-icon" name="eye-outline"></ion-icon>
                </section>
                <button class="button" type="submit" name="boton" value="crear" >Registrarse</button>
             
              
        </section>

        <section class="container-welcome">
            <section class="welcome-sign-up welcome">
                <h3>¡Bienvenido!</h3>
                <p>Ingrese los datos provistos por su institución. En caso de ser acudiente registrese abajo.</p>
                <button class="button" id="btn-sign-up" type="submit" name="boton" value="crear">Registrarse</button>
            </section>
            <section class="welcome-sign-in welcome">
                <h3>¡Saludos!</h3>
                <p>Registrese con su correo, contraseña e ID de su hijo para acceder al sitio.</p>
                <button  class="button" id="btn-sign-in">Iniciar sesión</button>
            </section>
        </section>
    

    </section>
    <section id="feedback-window">
        <h3><span>Parece que hubo un error</span></h3>
        <ion-icon id="feedback-close" name="close-circle"></ion-icon>
        <p id="feedback"></p>
    </section>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    </form>

</body>
</html>
